<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIN TỨC ĐẦU BÒ - AUTO CLEAN</title>
    <style>
        :root {
            --bg: #fdfcf0;
            --accent: #000;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            color: #333;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: #fff;
            border: 6px solid var(--accent);
            box-shadow: 10px 10px 0 var(--accent);
            margin-bottom: 50px;
        }

        h1 { margin: 0; font-size: 2.5em; text-transform: uppercase; letter-spacing: 2px; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        /* KHUNG CHỨA TIN TỰ ĐỘNG */
        .news-section {
            background: var(--card-bg);
            border: 5px solid var(--accent);
            border-radius: 15px;
            padding: 0;
            overflow: hidden;
            box-shadow: 12px 12px 0 rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 650px; /* Độ cao cố định để cuộn tin bên trong */
        }

        .section-title {
            background: var(--accent);
            color: #fff;
            padding: 15px;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 2px;
        }

        /* TÙY CHỈNH IFRAME ĐỂ HIỂN THỊ TIN */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            text-align: center;
            margin-top: 80px;
            padding: 30px;
            border-top: 5px solid var(--accent);
            font-weight: bold;
            background: #fff;
        }

        /* HIỆU ỨNG KHI REFRESH */
        .status-bar {
            text-align: right;
            font-size: 0.8em;
            margin-bottom: 10px;
            font-weight: bold;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>📰 TIN TỨC KHÔNG NHIỄU</h1>
        <p>Hệ thống lọc tin tự động dành cho Trần Bảo Nam - Cập nhật 2026</p>
    </header>

    <div class="container">
        
        <div class="news-section">
            <div class="section-title">⚽ BÓNG ĐÁ QUỐC TẾ</div>
            <iframe src="https://rss.app/embed/v1/list/tW9uGvX7Vz8P5r4N" title="Bóng đá"></iframe>
        </div>

        <div class="news-section">
            <div class="section-title">🏴‍☠️ ONE PIECE & GAME</div>
            <iframe src="https://rss.app/embed/v1/list/tK2yLpM4Rz9Q1w6X" title="GameK"></iframe>
        </div>

        <div class="news-section">
            <div class="section-title">⚡ TOKUSATSU & TECH</div>
            <iframe src="https://rss.app/embed/v1/list/t0mJpL3HqR8S2w5V" title="Tech"></iframe>
        </div>

    </div>

    <footer>
        THIẾT KẾ BỞI NAM KO HỀ | DỮ LIỆU ĐƯỢC LỌC SẠCH 100%
    </footer>

</body>
</html>
