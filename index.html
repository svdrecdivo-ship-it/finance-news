<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIN TỨC KINH TẾ - ĐỊA CHÍNH TRỊ | NAM KO HỀ</title>
    <style>
        :root {
            --bg: #fdfcf0;
            --accent: #000;
            --card-bg: #ffffff;
            --economic: #1a237e; /* Xanh đậm cho kinh tế */
            --geopolitics: #b71c1c; /* Đỏ đậm cho địa chính trị */
            --global: #1b5e20; /* Xanh lá cho thế giới */
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: #fff;
            border: 6px solid var(--accent);
            box-shadow: 10px 10px 0 var(--accent);
            margin-bottom: 50px;
        }

        h1 { margin: 0; font-size: 2.2em; text-transform: uppercase; letter-spacing: 2px; }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 30px;
        }

        .news-section {
            background: var(--card-bg);
            border: 4px solid var(--accent);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 700px;
        }

        .section-title {
            color: #fff;
            padding: 15px;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
            font-size: 1.1em;
        }

        /* MÀU SẮC RIÊNG CHO TỪNG MỤC */
        .title-eco { background: var(--economic); }
        .title-geo { background: var(--geopolitics); }
        .title-glo { background: var(--global); }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            border-top: 5px solid var(--accent);
            font-weight: bold;
            background: #fff;
        }
    </style>
</head>
<body>

    <header>
        <h1>📊 TRUNG TÂM TIN TỨC CHIẾN LƯỢC</h1>
        <p>Kinh tế - Tài chính - Địa chính trị thế giới (Cập nhật tự động 2026)</p>
    </header>

    <div class="container">
        
        <div class="news-section">
            <div class="section-title title-eco">📈 KINH TẾ & TÀI CHÍNH</div>
            <iframe src="https://rss.app/embed/v1/list/tW9uGvX7Vz8P5r4N" title="Economic News"></iframe>
        </div>

        <div class="news-section">
            <div class="section-title title-geo">🌍 ĐỊA CHÍNH TRỊ QUỐC TẾ</div>
            <iframe src="https://rss.app/embed/v1/list/tK2yLpM4Rz9Q1w6X" title="Global Politics"></iframe>
        </div>

        <div class="news-section">
            <div class="section-title title-glo">⚖️ PHÂN TÍCH THỊ TRƯỜNG</div>
            <iframe src="https://rss.app/embed/v1/list/t0mJpL3HqR8S2w5V" title="Market Analysis"></iframe>
        </div>

    </div>

    <footer>
        DESIGNED BY NAM KO HỀ | HỆ THỐNG LỌC TIN SẠCH 2026
    </footer>

</body>
</html>
