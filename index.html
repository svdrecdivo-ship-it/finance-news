<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUNG TÂM TIN TỨC CHIẾN LƯỢC | NAM KO HỀ</title>
    <style>
        :root {
            --bg: #fdfcf0;
            --accent: #000;
            --card-bg: #ffffff;
            --blue: #0d47a1;
            --red: #b71c1c;
            --green: #1b5e20;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
        }

        header {
            text-align: center;
            padding: 25px;
            background: #fff;
            border: 5px solid var(--accent);
            box-shadow: 8px 8px 0 var(--accent);
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 2.2em; text-transform: uppercase; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 25px;
        }

        .news-section {
            background: var(--card-bg);
            border: 4px solid var(--accent);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.1);
            height: 750px;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            color: #fff;
            padding: 15px;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            font-size: 1.2em;
        }

        .bg-blue { background: var(--blue); }
        .bg-red { background: var(--red); }
        .bg-green { background: var(--green); }

        /* KHUNG HIỂN THỊ TIN TỨC */
        .feed-frame {
            flex-grow: 1;
            border: none;
            width: 100%;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            border-top: 4px solid var(--accent);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>🏛️ TRUNG TÂM TIN TỨC CHIẾN LƯỢC</h1>
        <p>Kinh tế - Địa chính trị - Tài chính (Cập nhật 2026)</p>
    </header>

    <div class="container">
        
        <div class="news-section">
            <div class="section-title bg-blue">📈 KINH TẾ QUỐC TẾ</div>
            <iframe class="feed-frame" src="https://www.bing.com/news/search?q=kinh+tế+thế+giới&format=rss&setmkt=vi-vn" ></iframe>
        </div>

        <div class="news-section">
            <div class="section-title bg-red">🌍 ĐỊA CHÍNH TRỊ</div>
            <iframe class="feed-frame" src="https://www.bing.com/news/search?q=địa+chính+trị+toàn+cầu&format=rss&setmkt=vi-vn" ></iframe>
        </div>

        <div class="news-section">
            <div class="section-title bg-green">⚖️ TÀI CHÍNH - THỊ TRƯỜNG</div>
            <iframe class="feed-frame" src="https://www.bing.com/news/search?q=thị+trường+tài+chính&format=rss&setmkt=vi-vn" ></iframe>
        </div>

    </div>

    <footer>
        DESIGNED BY NAM KO HỀ | CÔNG CỤ LỌC TIN 2026
    </footer>

</body>
</html>
