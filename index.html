<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIN TỨC CHIẾN LƯỢC | NAM KO HỀ</title>
    <style>
        :root {
            --bg: #fdfcf0;
            --accent: #000;
            --card-bg: #ffffff;
            --eco: #0d47a1;
            --geo: #b71c1c;
            --analysis: #1b5e20;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px;
            background: #fff;
            border: 6px solid var(--accent);
            box-shadow: 10px 10px 0 var(--accent);
            margin-bottom: 40px;
        }

        h1 { margin: 0; font-size: 2.2em; text-transform: uppercase; letter-spacing: 2px; }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 30px;
        }

        .news-section {
            background: var(--card-bg);
            border: 4px solid var(--accent);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.1);
            height: 750px;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            color: #fff;
            padding: 15px;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            font-size: 1.1em;
        }

        .title-eco { background: var(--eco); }
        .title-geo { background: var(--geo); }
        .title-ana { background: var(--analysis); }

        /* VÙNG CHỨA TIN TỰ ĐỘNG CÓ THANH CUỘN */
        .feed-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            background: #fff;
        }

        /* Tùy chỉnh giao diện danh sách tin */
        .feed-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            border-top: 5px solid var(--accent);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>📊 TRUNG TÂM TIN TỨC CHIẾN LƯỢC</h1>
        <p>Kinh tế - Địa chính trị - Tài chính (Tự động cập nhật 2026)</p>
    </header>

    <div class="container">
        
        <div class="news-section">
            <div class="section-title title-eco">📈 KINH TẾ THẾ GIỚI</div>
            <div class="feed-container">
                <iframe src="https://feed.mikle.com/widget/v2/161405/" ></iframe>
            </div>
        </div>

        <div class="news-section">
            <div class="section-title title-geo">🌍 ĐỊA CHÍNH TRỊ & THẾ GIỚI</div>
            <div class="feed-container">
                <iframe src="https://feed.mikle.com/widget/v2/161406/" ></iframe>
            </div>
        </div>

        <div class="news-section">
            <div class="section-title title-ana">⚖️ PHÂN TÍCH TÀI CHÍNH</div>
            <div class="feed-container">
                <iframe src="https://feed.mikle.com/widget/v2/161407/" ></iframe>
            </div>
        </div>

    </div>

    <footer>
        HỆ THỐNG LỌC TIN SẠCH | DESIGNED BY NAM KO HỀ
    </footer>

</body>
</html>
