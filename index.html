<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống cập nhật thông tin 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11;
            --card-bg: #161a1e;
            --text: #eaecef;
            --accent: #00ff88;
            --border: #2b3139;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 1. Tin nóng chạy (Marquee) - Màu xanh chuyên nghiệp */
        .marquee-container {
            background: #1e2329;
            color: var(--accent);
            padding: 15px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: bold;
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        /* 2. Tiêu đề cực lớn */
        header {
            margin-top: 120px;
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 5.5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -3px;
            text-transform: uppercase;
        }

        header p {
            font-size: 1.8rem;
            color: #848e9c;
            font-weight: 300;
            margin-top: 10px;
        }

        /* 3. Layout tận dụng toàn bộ bề ngang */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            width: 98vw;
            margin: 0 auto;
        }

        .section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            min-height: 700px;
            padding: 20px;
        }

        .section h2 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: var(--accent);
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        /* 4. Widget TradingView - Đảm bảo dữ liệu chính xác 100% */
        .widget-container {
            flex-grow: 1;
            width: 100%;
            border-radius: 4px;
            overflow: hidden;
            background: #161a1e;
        }

        /* 5. Nút bấm chuyên nghiệp */
        .btn-link {
            display: block;
            text-align: center;
            padding: 20px;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            margin-top: 20px;
            font-weight: 900;
            font-size: 1.1rem;
            border-radius: 4px;
            transition: transform 0.2s;
        }

        .btn-link:hover {
            transform: scale(1.02);
            background: #00d977;
        }

        footer {
            text-align: center;
            padding: 60px 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: #848e9c;
            letter-spacing: 5px;
        }

        @media (max-width: 1200px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 3rem; }
        }
    </style>
</head>

        </marquee>
    </div>
