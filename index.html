<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloomberg Mini Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#0b0f14;color:#e6e6e6}
header{padding:20px;text-align:center;background:#111}
header h1{margin:0;font-size:26px}

.ticker{background:#000;color:#00ff9c;padding:8px;font-family:monospace;white-space:nowrap;overflow:hidden}

.grid{display:grid;grid-template-columns:2fr 1fr;gap:10px;padding:10px}

.panel{background:#111;border-radius:10px;padding:10px}

.table{width:100%;font-size:13px}
.table tr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #222}
.green{color:#00ff9c}
.red{color:#ff4d4d}

.heatmap{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.box{padding:10px;border-radius:6px;text-align:center;font-size:13px}

footer{text-align:center;padding:10px;background:#000}
</style>
</head>
<body>

<header>
<h1>📊 BLOOMBERG MINI TERMINAL - NAM</h1>
</header>

<div class="ticker" id="ticker">Loading...</div>

<div class="grid">

<!-- LEFT: MARKET TABLE -->
<div class="panel">
<h3>Top cổ phiếu (VN)</h3>
<table class="table" id="stocks"></table>
</div>

<!-- RIGHT: HEATMAP -->
<div class="panel">
<h3>Heatmap ngành</h3>
<div class="heatmap" id="heatmap"></div>
</div>

</div>

<footer>
Trang web được thiết kế bởi Nam ko Hề
</footer>

<script>

const stockList = ["VCB","BID","CTG","HPG","VNM","FPT","MWG","GAS","SSI"];

async function loadStocks(){
  let html="";

  stockList.forEach(s=>{
    let price = (Math.random()*100+20).toFixed(2);
    let change = (Math.random()*4-2).toFixed(2);

    html += `<tr>
      <td>${s}</td>
      <td class="${change>0?'green':'red'}">${price} (${change}%)</td>
    </tr>`;
  });

  document.getElementById("stocks").innerHTML = html;
}

function loadHeatmap(){
  const sectors = [
    {name:"Bank", val:Math.random()},
    {name:"Oil", val:Math.random()},
    {name:"Steel", val:Math.random()},
    {name:"Retail", val:Math.random()},
    {name:"Tech", val:Math.random()},
    {name:"Export", val:Math.random()}
  ];

  let html="";
  sectors.forEach(s=>{
    let green = Math.floor(255*s.val);
    let red = 255-green;
    html += `<div class="box" style="background:rgb(${red},${green},80)">${s.name}</div>`;
  });

  document.getElementById("heatmap").innerHTML = html;
}

async function loadTicker(){
  const res = await fetch('https://api.exchangerate.host/latest?base=USD&symbols=VND,EUR');
  const data = await res.json();

  let usd = data.rates.VND.toFixed(0);
  let eur = (1/data.rates.EUR).toFixed(2);

  document.getElementById("ticker").innerText = `USD/VND: ${usd} | EUR/USD: ${eur} | GOLD ~ 2300 | OIL ~ 90`;
}

function refresh(){
  loadStocks();
  loadHeatmap();
  loadTicker();
}

refresh();
setInterval(refresh,10000);

</script>

</body>
</html>
